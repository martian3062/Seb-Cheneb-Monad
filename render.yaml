services:
  # ─── FastAPI Backend (Python) ───
  - type: web
    name: evolet-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      cd apps/api
      pip install -r requirements.txt
    startCommand: |
      cd apps/api
      uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./ai_agents_test.db"
    healthCheckPath: /
    autoDeploy: true
